<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskRadar Configurator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        .mode-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border: 1px solid #333;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 0.6rem;
            margin-bottom: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <nav style="text-align: center; margin-bottom: 1.5rem;">
            <a href="/" style="margin-right: 1rem; font-weight: 600;">Home</a>
            <a href="/config" style="font-weight: 600;">Config</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
